[config]
deadzone_mode = axial
deadzone_scale = 9
deadzone_x = 500
deadzone_y = 500
mouse_delay = 10
mouse_scale = 9
deadzone_triggers = 1000
repeat_delay = 1000
repeat_rate = 10
dpad_mouse_normalize = false

[controls]
overlay = clear
up = t
down = b
left = tab add_shift
right = tab
select = 2
start = esc
a = mouse_left
b = space
x = x
y = f3
l1 = leftshift
l2 = q
r1 = mouse_right
r2 = e
l3 = g
r3 = f
left_analog_up = w
left_analog_left = a
left_analog_down = s
left_analog_right = d
right_analog = mouse_movement
guide = hold_state guide_commands

[controls:guide_commands]
overlay = clear
a = s add_ctrl
b = push_state text_input

[controls:text_input]
overlay = clear
charset = full
up = prev_letter
down = next_letter
left = remove_letter
right = add_letter
a = add_letter
b = remove_letter
l1 = prev_letter10
r1 = next_letter10
start = finish_text
select = cancel_text
